<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelNet | Security Audit Lab</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body class="hack-mode">
    <div class="matrix-bg"></div>

    <div class="hack-container">
        <header class="header">
            <h1>SECURITY.AUDIT.LAB</h1>
            <div class="status">SYSTEM.READY</div>
        </header>

        <div class="layout">
            <aside class="sidebar">
                <div class="panel">
                    <h2>TARGET_DISCOVERY</h2>
                    <ul class="target-list" id="target-list">
                        <li class="empty-state">Finding targets...</li>
                    </ul>
                    <button class="btn-hack" style="width: 100%; margin-top: 1rem;"
                        onclick="refreshTargets()">REFRESH_TARGETS</button>

                    <div class="nav-links">
                        <a href="dashboard.html">← Return to Dashboard</a>
                    </div>
                </div>
            </aside>

            <main class="main-content">
                <div class="panel">
                    <h2>AUDIT_CONSOLE</h2>
                    <div class="terminal-container" id="terminal">
                        <div class="terminal-line"><span class="prompt">guest@sentinelnet:~$</span> Initializing
                            Security Lab...</div>
                        <div class="terminal-line"><span class="prompt">guest@sentinelnet:~$</span> Ready for
                            engagement. Select target.</div>
                    </div>

                    <div id="target-details" style="display: none;">
                        <h3 id="current-target-ip">TARGET: 0.0.0.0</h3>
                        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                            <button class="btn-hack" id="btn-fingerprint"
                                onclick="startAudit()">INITIATE_FINGERPRINTING</button>
                        </div>
                    </div>
                </div>

                <div class="panel" style="margin-top: 2rem;">
                    <h2>EXPOSURE_REPORT</h2>
                    <div id="exposure-report">
                        <p style="color: #666;">No active audit session.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Scanning Overlay -->
    <div class="scan-overlay" id="scan-overlay">
        <div class="scan-anim">
            <h2 id="overlay-text">ANALYZING_TARGET</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p id="overlay-subtext"
                style="margin-top: 10px; font-family: 'Fira Code', monospace; font-size: 0.8rem; color: #888;"></p>
        </div>
    </div>

    <script src="hack.js"></script>
</body>

</html>
